<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI Demo - Item Manager</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-box"></i> Item Manager</h1>
            <p>Manage your items with this FastAPI-powered application</p>
        </header>

        <div class="main-content">
            <!-- API Status -->
            <div class="status-card">
                <h3><i class="fas fa-heartbeat"></i> API Status</h3>
                <div id="api-status" class="status-indicator">
                    <span class="status-dot"></span>
                    <span class="status-text">Checking...</span>
                </div>
            </div>

            <!-- Add Item Form -->
            <div class="card">
                <h3><i class="fas fa-plus"></i> Add New Item</h3>
                <form id="add-item-form">
                    <div class="form-group">
                        <label for="item-name">Name *</label>
                        <input type="text" id="item-name" required maxlength="100">
                    </div>
                    <div class="form-group">
                        <label for="item-description">Description</label>
                        <textarea id="item-description" rows="3"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="item-price">Price *</label>
                            <input type="number" id="item-price" step="0.01" min="0.01" required>
                        </div>
                        <div class="form-group">
                            <label for="item-category">Category *</label>
                            <select id="item-category" required>
                                <option value="">Select category...</option>
                                <option value="Electronics">Electronics</option>
                                <option value="Books">Books</option>
                                <option value="Clothing">Clothing</option>
                                <option value="Home">Home</option>
                                <option value="Sports">Sports</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Add Item
                    </button>
                </form>
            </div>

            <!-- Filters -->
            <div class="card">
                <h3><i class="fas fa-filter"></i> Filters</h3>
                <div class="filter-row">
                    <div class="form-group">
                        <label for="filter-category">Filter by Category</label>
                        <select id="filter-category">
                            <option value="">All categories</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Books">Books</option>
                            <option value="Clothing">Clothing</option>
                            <option value="Home">Home</option>
                            <option value="Sports">Sports</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <button id="refresh-btn" class="btn btn-secondary">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </div>
            </div>

            <!-- Items List -->
            <div class="card">
                <h3><i class="fas fa-list"></i> Items</h3>
                <div id="loading" class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading items...
                </div>
                <div id="items-container"></div>
                <div id="no-items" class="no-items" style="display: none;">
                    <i class="fas fa-box-open"></i>
                    <p>No items found. Add some items to get started!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-edit"></i> Edit Item</h3>
                <button class="close-btn" onclick="closeEditModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="edit-item-form">
                <input type="hidden" id="edit-item-id">
                <div class="form-group">
                    <label for="edit-item-name">Name *</label>
                    <input type="text" id="edit-item-name" required maxlength="100">
                </div>
                <div class="form-group">
                    <label for="edit-item-description">Description</label>
                    <textarea id="edit-item-description" rows="3"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="edit-item-price">Price *</label>
                        <input type="number" id="edit-item-price" step="0.01" min="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-item-category">Category *</label>
                        <select id="edit-item-category" required>
                            <option value="">Select category...</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Books">Books</option>
                            <option value="Clothing">Clothing</option>
                            <option value="Home">Home</option>
                            <option value="Sports">Sports</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeEditModal()">
                        Cancel
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Update Item
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container"></div>

    <script type="module" src="main.js"></script>
</body>
</html>
